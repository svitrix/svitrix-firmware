name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  release:
    name: Release firmware
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO and jq
        run: |
          pip install --upgrade platformio
          sudo apt-get -y install jq

      - name: Compile firmware with version
        run: |
          pio run --environment ulanzi \
            -e "build_flags=-DVERSION=\"\\\"${{ steps.version.outputs.version }}\\\"\""

      - name: Sync version file
        run: echo '${{ steps.version.outputs.version }}' > version

      - name: Update web flasher
        run: |
          cp .pio/build/ulanzi/firmware.bin docs/public/ulanzi_flasher/firmware/firmware.bin
          jq '.version = "${{ steps.version.outputs.version }}"' \
            docs/public/ulanzi_flasher/firmware/manifest.json > manifest.tmp \
            && mv manifest.tmp docs/public/ulanzi_flasher/firmware/manifest.json

      - name: Commit updated release files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: "release: v${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: .pio/build/ulanzi/firmware.bin
