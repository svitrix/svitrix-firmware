name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'test/**'
      - '.clang-format'
      - '.github/workflows/**'
      - 'platformio.ini'
  workflow_call:

jobs:
  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Run clang-format check
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '18'
          check-path: 'src'
          fallback-style: 'LLVM'

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=toomanyconfigs \
            --suppress=uninitMemberVarPrivate \
            --suppress=uninitMemberVar \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            --quiet \
            src/

  clang-tidy:
    name: Clang-Tidy (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-18

      - name: Run clang-tidy on lib/services/
        # Scope: lib/services/ only — pure C++ that compiles without ESP32 toolchain.
        # Mode: advisory (continue-on-error above). Tighten the gate by removing
        # continue-on-error once the codebase is clean. Add other paths to the
        # globbed list when their headers don't need xtensa-specific resolution.
        run: |
          mapfile -t files < <(git ls-files 'lib/services/src/*.cpp')
          if [ ${#files[@]} -eq 0 ]; then
            echo "No lib/services/ files matched, skipping."
            exit 0
          fi
          clang-tidy-18 --quiet "${files[@]}" -- \
            -std=c++17 \
            -DUNIT_TEST \
            -Ilib/services/src \
            -Ilib/interfaces/src

  test:
    name: Unit Tests (native)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run native tests
        run: pio test --environment native_test --verbose

  build:
    name: Build firmware
    needs: [lint, static-analysis, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Compile ulanzi environment
        run: pio run --environment ulanzi
