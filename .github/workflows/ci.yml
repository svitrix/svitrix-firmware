name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'test/**'
      - '.clang-format'
      - '.github/workflows/**'
      - 'platformio.ini'
  workflow_call:

jobs:
  lint:
    name: Lint (clang-format)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Run clang-format check
        uses: jidicula/clang-format-action@v4.13.0
        with:
          clang-format-version: '18'
          check-path: 'src'
          fallback-style: 'LLVM'

  static-analysis:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance \
            --suppress=missingInclude \
            --suppress=unusedFunction \
            --suppress=unmatchedSuppression \
            --suppress=toomanyconfigs \
            --suppress=uninitMemberVarPrivate \
            --suppress=uninitMemberVar \
            --inline-suppr \
            --std=c++17 \
            --error-exitcode=1 \
            --quiet \
            src/

  test:
    name: Unit Tests (native)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Run native tests
        run: pio test --environment native_test --verbose

  build:
    name: Build firmware
    needs: [lint, static-analysis, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Compile ulanzi environment
        run: pio run --environment ulanzi
