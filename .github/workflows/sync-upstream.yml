name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'  # Diario a las 6:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/svitrix/svitrix-firmware.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for changes
        id: check
        run: |
          CHANGES=$(git rev-list HEAD..upstream/main --count)
          echo "changes=$CHANGES" >> $GITHUB_OUTPUT
          echo "Commits behind upstream: $CHANGES"

      - name: Merge upstream
        if: steps.check.outputs.changes != '0'
        run: |
          git merge upstream/main --no-edit || {
            echo "::error::Merge conflict detected. Manual intervention required."
            git merge --abort
            exit 1
          }

      - name: Push changes
        if: steps.check.outputs.changes != '0'
        run: git push
